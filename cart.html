<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Giỏ hàng</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2 style="text-align:center;">🛒 Giỏ hàng</h2>
<div id="box"></div>
<h3 id="total"></h3>

<script>
let products=JSON.parse(localStorage.getItem("products"));
let cart=JSON.parse(localStorage.getItem("cart"))||[];

let total=0;

cart.forEach(item=>{
let p=products[item.id];
total+=p[1]*item.qty;
box.innerHTML+=`<p>${p[0]} x ${item.qty}</p>`;
});

total.innerText="Tổng: "+total.toLocaleString()+"₫";
</script>

</body>
</html>
